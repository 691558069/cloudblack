name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          ext=""
          archive="tar.gz"
          if [ "$GOOS" = "windows" ]; then ext=".exe"; archive="zip"; fi
          name="cloudblack-$GOOS-$GOARCH"

          mkdir -p "$name/data"
          go build -ldflags="-s -w" -o "$name/cloudblack$ext" .
          cp config.json "$name/config.json"
          if [ "$GOOS" = "windows" ]; then cp start-windows.bat "$name/start-windows.bat"; fi

          if [ "$archive" = "zip" ]; then
            zip -qr "$name.zip" "$name"
          else
            tar -czf "$name.tar.gz" "$name"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudblack-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cloudblack-${{ matrix.goos }}-${{ matrix.goarch }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cloudblack-*
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: cloudblack-*
          generate_release_notes: true
